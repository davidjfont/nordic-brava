<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias | NÓRDIC - Brava Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --soft: #fcfaf7;
            --line: #eaddd0;
            --accent: #1a1a1a;
            --ink: #2a2a2a;
            --muted: #666666;
            --radius: 12px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--soft);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .thanks-card {
            max-width: 500px;
            padding: 60px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--line);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--muted);
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 99px;
            font-weight: 500;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="thanks-card">
        <h1>¡Gracias!</h1>
        <p>Hemos recibido su solicitud correctamente. Nuestro equipo revisará su proyecto y se pondrá en contacto con
            usted en breve para asesorarle de forma personalizada.</p>
        <a href="index.html" class="btn">Volver a la web</a>
    </div>
</body>

</html>
